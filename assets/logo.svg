<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F12"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#f0f7f0" stroke="#c8e6c9" stroke-width="2"/>
  <!-- Trunk -->
  <rect x="55" y="60" width="10" height="30" rx="2" fill="url(#trunk)"/>
  <!-- Branches -->
  <line x1="60" y1="70" x2="42" y2="58" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="65" x2="78" y2="53" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <!-- Crown (layered circles) -->
  <circle cx="60" cy="38" r="20" fill="url(#leaf)" opacity="0.9"/>
  <circle cx="45" cy="48" r="14" fill="url(#leaf)" opacity="0.85"/>
  <circle cx="75" cy="48" r="14" fill="url(#leaf)" opacity="0.85"/>
  <circle cx="60" cy="30" r="12" fill="url(#glow)" opacity="0.7"/>
  <!-- Memory nodes -->
  <circle cx="38" cy="42" r="4" fill="#fff" opacity="0.6"/>
  <circle cx="60" cy="28" r="4" fill="#fff" opacity="0.6"/>
  <circle cx="78" cy="44" r="4" fill="#fff" opacity="0.6"/>
  <!-- Connection lines between nodes -->
  <line x1="40" y1="41" x2="58" y2="29" stroke="#fff" stroke-width="1.2" opacity="0.4"/>
  <line x1="62" y1="29" x2="76" y2="43" stroke="#fff" stroke-width="1.2" opacity="0.4"/>
  <!-- Root lines -->
  <line x1="58" y1="90" x2="48" y2="100" stroke="#6B4F12" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="62" y1="90" x2="72" y2="100" stroke="#6B4F12" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="60" y1="90" x2="60" y2="102" stroke="#6B4F12" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
